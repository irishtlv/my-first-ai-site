<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — Image Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f4f1ec;
    --surface:   #fffef9;
    --ink:       #1a1714;
    --ink-muted: #7a7570;
    --accent:    #c9472b;
    --accent-lt: #f5ddd8;
    --border:    #e2ddd6;
    --shadow:    0 2px 12px rgba(26,23,20,.08);
    --radius:    6px;
    --mono:      'DM Mono', monospace;
    --serif:     'Fraunces', Georgia, serif;
  }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: -.02em;
    color: var(--ink);
  }
  .logo span { color: var(--accent); font-style: italic; }

  .header-meta {
    font-size: .7rem;
    color: var(--ink-muted);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  /* ── LAYOUT ── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2.5rem 2rem;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stats {
    display: flex;
    gap: 2rem;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: .1rem;
  }

  .stat-value {
    font-family: var(--serif);
    font-size: 1.6rem;
    font-weight: 600;
    line-height: 1;
    color: var(--ink);
  }

  .stat-label {
    font-size: .65rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .toolbar-actions {
    display: flex;
    align-items: center;
    gap: .75rem;
  }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: .45rem;
    padding: .55rem 1.1rem;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: .75rem;
    letter-spacing: .04em;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all .18s ease;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .btn-primary:hover {
    background: var(--accent);
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(201,71,43,.25);
  }

  .btn-ghost {
    background: transparent;
    color: var(--ink-muted);
    border-color: var(--border);
  }
  .btn-ghost:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-lt);
  }

  .btn svg { flex-shrink: 0; }

  /* ── UPLOAD ZONE ── */
  #drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all .2s ease;
    margin-bottom: 2.5rem;
    background: var(--surface);
    display: none;
  }

  #drop-zone.visible { display: block; }

  #drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-lt);
  }

  .drop-icon {
    width: 44px;
    height: 44px;
    margin: 0 auto .75rem;
    background: var(--accent-lt);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
  }

  .drop-title {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: .3rem;
  }

  .drop-sub {
    font-size: .72rem;
    color: var(--ink-muted);
    letter-spacing: .04em;
  }

  #file-input { display: none; }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: .75rem;
    margin-bottom: 1.25rem;
  }

  .section-title {
    font-size: .68rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    font-weight: 500;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── GRID ── */
  #image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.25rem;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform .2s ease, box-shadow .2s ease;
    animation: fadeUp .3s ease both;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(26,23,20,.12);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-img-wrap {
    aspect-ratio: 4/3;
    overflow: hidden;
    background: var(--bg);
    position: relative;
    cursor: pointer;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform .35s ease;
    display: block;
  }

  .card:hover .card-img-wrap img { transform: scale(1.04); }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(26,23,20,.45);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity .2s ease;
  }

  .card:hover .card-overlay { opacity: 1; }

  .overlay-expand {
    background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.4);
    border-radius: var(--radius);
    padding: .4rem .7rem;
    font-family: var(--mono);
    font-size: .65rem;
    color: #fff;
    letter-spacing: .06em;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background .15s;
  }

  .overlay-expand:hover { background: rgba(255,255,255,.3); }

  .card-footer {
    padding: .65rem .75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    gap: .5rem;
  }

  .card-name {
    font-size: .7rem;
    color: var(--ink-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .btn-delete {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-muted);
    padding: .2rem;
    border-radius: 4px;
    display: flex;
    align-items: center;
    transition: color .15s, background .15s;
    flex-shrink: 0;
  }

  .btn-delete:hover { color: var(--accent); background: var(--accent-lt); }

  /* ── EMPTY STATE ── */
  #empty-state {
    text-align: center;
    padding: 5rem 2rem;
    display: none;
  }

  #empty-state.visible { display: block; }

  .empty-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    opacity: .35;
  }

  .empty-title {
    font-family: var(--serif);
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: .4rem;
    color: var(--ink-muted);
  }

  .empty-sub {
    font-size: .72rem;
    color: var(--ink-muted);
    opacity: .7;
  }

  /* ── LIGHTBOX ── */
  #lightbox {
    position: fixed;
    inset: 0;
    background: rgba(26,23,20,.88);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
    padding: 1.5rem;
  }

  #lightbox.open { opacity: 1; pointer-events: all; }

  #lightbox img {
    max-width: 90vw;
    max-height: 88vh;
    border-radius: 6px;
    box-shadow: 0 24px 80px rgba(0,0,0,.5);
    transform: scale(.95);
    transition: transform .25s ease;
    display: block;
  }

  #lightbox.open img { transform: scale(1); }

  .lb-close {
    position: fixed;
    top: 1.2rem;
    right: 1.5rem;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff;
    border-radius: var(--radius);
    padding: .4rem .7rem;
    font-family: var(--mono);
    font-size: .72rem;
    cursor: pointer;
    letter-spacing: .06em;
    transition: background .15s;
  }

  .lb-close:hover { background: rgba(255,255,255,.22); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--ink);
    color: var(--bg);
    font-family: var(--mono);
    font-size: .72rem;
    letter-spacing: .04em;
    padding: .65rem 1.1rem;
    border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(0,0,0,.25);
    transform: translateY(8px);
    opacity: 0;
    transition: all .25s ease;
    pointer-events: none;
    z-index: 500;
  }

  #toast.show { transform: translateY(0); opacity: 1; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    main   { padding: 1.5rem 1rem; }
    .stats { gap: 1.25rem; }
    .stat-value { font-size: 1.3rem; }
    #image-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: .85rem; }
    .toolbar { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Va<span>ul</span>t</div>
  <div class="header-meta" id="header-date"></div>
</header>

<main>
  <div class="toolbar">
    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="count">0</span>
        <span class="stat-label">Images</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="size-total">0 KB</span>
        <span class="stat-label">Total size</span>
      </div>
    </div>
    <div class="toolbar-actions">
      <button class="btn btn-ghost" id="toggle-drop">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
        Drop zone
      </button>
      <button class="btn btn-primary" id="upload-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Upload images
      </button>
    </div>
  </div>

  <!-- Drop zone -->
  <div id="drop-zone">
    <div class="drop-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
    </div>
    <p class="drop-title">Drop images here</p>
    <p class="drop-sub">PNG, JPG, GIF, WebP — or click Upload images above</p>
  </div>

  <input type="file" id="file-input" accept="image/*" multiple>

  <!-- Grid section -->
  <div class="section-header">
    <span class="section-title">Library</span>
    <div class="section-line"></div>
  </div>

  <div id="image-grid"></div>

  <!-- Empty state -->
  <div id="empty-state" class="visible">
    <div class="empty-icon">🖼</div>
    <p class="empty-title">No images yet</p>
    <p class="empty-sub">Upload your first image to get started</p>
  </div>
</main>

<!-- Lightbox -->
<div id="lightbox">
  <button class="lb-close" id="lb-close">✕ close</button>
  <img id="lb-img" src="" alt="preview">
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const grid       = document.getElementById('image-grid');
  const fileInput  = document.getElementById('file-input');
  const uploadBtn  = document.getElementById('upload-btn');
  const dropZone   = document.getElementById('drop-zone');
  const toggleDrop = document.getElementById('toggle-drop');
  const emptyState = document.getElementById('empty-state');
  const countEl    = document.getElementById('count');
  const sizeEl     = document.getElementById('size-total');
  const lightbox   = document.getElementById('lightbox');
  const lbImg      = document.getElementById('lb-img');
  const lbClose    = document.getElementById('lb-close');
  const toastEl    = document.getElementById('toast');
  const headerDate = document.getElementById('header-date');

  let images = []; // { id, name, src, size }
  let toastTimer;

  // Date
  headerDate.textContent = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });

  // ── Upload triggers
  uploadBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => handleFiles(e.target.files));

  // ── Drop zone toggle
  toggleDrop.addEventListener('click', () => dropZone.classList.toggle('visible'));

  // ── Drag & drop
  dropZone.addEventListener('click', () => fileInput.click());

  ;['dragenter','dragover'].forEach(ev =>
    dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('drag-over'); })
  );
  ;['dragleave','drop'].forEach(ev =>
    dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('drag-over'); })
  );
  dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));

  // Global drag-over-body support
  document.body.addEventListener('dragover', e => e.preventDefault());
  document.body.addEventListener('drop', e => {
    e.preventDefault();
    const files = e.dataTransfer.files;
    if (files.length) { handleFiles(files); toast(`↓ Dropped ${files.length} image${files.length > 1 ? 's' : ''}`); }
  });

  // ── Process files
  function handleFiles(files) {
    const valid = Array.from(files).filter(f => f.type.startsWith('image/'));
    if (!valid.length) { toast('No valid images found'); return; }

    valid.forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = { id: Date.now() + Math.random(), name: file.name, src: e.target.result, size: file.size };
        images.push(img);
        addCard(img);
        updateStats();
      };
      reader.readAsDataURL(file);
    });

    fileInput.value = '';
    toast(`✓ ${valid.length} image${valid.length > 1 ? 's' : ''} uploaded`);
  }

  // ── Add card
  function addCard(img) {
    emptyState.classList.remove('visible');

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = img.id;
    card.innerHTML = `
      <div class="card-img-wrap">
        <img src="${img.src}" alt="${img.name}" loading="lazy">
        <div class="card-overlay">
          <button class="overlay-expand" data-expand="${img.id}">⤢ View</button>
        </div>
      </div>
      <div class="card-footer">
        <span class="card-name" title="${img.name}">${img.name}</span>
        <button class="btn-delete" title="Delete" data-delete="${img.id}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>`;

    grid.prepend(card);

    // Delete
    card.querySelector('[data-delete]').addEventListener('click', () => deleteImage(img.id));
    // Expand
    card.querySelector('[data-expand]').addEventListener('click', () => openLightbox(img.src));
    card.querySelector('.card-img-wrap img').addEventListener('click', () => openLightbox(img.src));
  }

  // ── Delete
  function deleteImage(id) {
    images = images.filter(i => i.id !== id);
    const card = grid.querySelector(`[data-id="${id}"]`);
    if (card) {
      card.style.transition = 'opacity .2s, transform .2s';
      card.style.opacity = '0';
      card.style.transform = 'scale(.94)';
      setTimeout(() => card.remove(), 200);
    }
    updateStats();
    if (!images.length) emptyState.classList.add('visible');
    toast('✕ Image removed');
  }

  // ── Stats
  function updateStats() {
    countEl.textContent = images.length;
    const total = images.reduce((s, i) => s + i.size, 0);
    sizeEl.textContent = formatBytes(total);
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  // ── Lightbox
  function openLightbox(src) {
    lbImg.src = src;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  // ── Toast
  function toast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
